name: OWASP ZAP Security Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: # <-- Este é o comando que permite rodar manualmente

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Analisar Segurança do Frontend (ZAP DAST)

    steps:
      # 1. Clonar o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Injetar o bypass da tela de bloqueio no HTML para o teste
      - name: Contornar autenticação para o Scanner
        run: |
          sed -i 's|</body>|<script>pularProtecao();</script></body>|' "Controle Financeiro.html"

      # 3. Configurar Python para servir a página estática
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # 4. Iniciar o servidor web local na porta 8080 em background
      - name: Iniciar servidor HTTP local
        run: |
          python -m http.server 8080 &
          sleep 5 # Aguarda 5 segundos para garantir que o servidor está pronto

      # 5. Executar a análise do OWASP ZAP
      - name: Executar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # URL alvo apontando para o servidor local e para o ficheiro HTML específico
          target: "http://localhost:8080/Controle%20Financeiro.html"

          # Mantemos false para que a pipeline não quebre imediatamente se encontrar apenas avisos
          fail_action: false

          # Cria automaticamente uma "Issue" no GitHub com os resultados encontrados
          issue_title: "Relatório de Segurança: OWASP ZAP"
