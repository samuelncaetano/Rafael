name: OWASP ZAP Security Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: # Permite correr o teste manualmente no separador "Actions"

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Analisar Segurança do Frontend (ZAP DAST)

    steps:
      # 1. Clonar o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Injetar o bypass do ecrã de bloqueio no HTML para o teste
      - name: Contornar autenticação para o Scanner
        run: |
          sed -i 's|</body>|<script>pularProtecao();</script></body>|' "Controle Financeiro.html"

      # 3. Configurar Python para servir a página estática
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # 4. Iniciar o servidor web local na porta 8080 em background
      - name: Iniciar servidor HTTP local
        run: |
          python -m http.server 8080 &
          sleep 5

      # 5. Executar a análise do OWASP ZAP
      - name: Executar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080/Controle%20Financeiro.html"

          # Não quebra a pipeline se encontrar apenas avisos
          fail_action: false

          # Impede o ZAP de criar issues no repositório
          allow_issue_writing: false

          # Força um nome válido para o ficheiro de relatório gerado
          artifact_name: "zap-security-report"
