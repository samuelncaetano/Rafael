name: OWASP ZAP Security Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: # Permite correr o teste manualmente

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Analisar Segurança do Frontend (ZAP DAST)

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Contornar autenticação para o Scanner
        run: |
          sed -i 's|</body>|<script>pularProtecao();</script></body>|' "Controle Financeiro.html"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Iniciar servidor HTTP local
        run: |
          python -m http.server 8080 &
          sleep 5

      - name: Executar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080/Controle%20Financeiro.html"
          fail_action: false
          # Impede o ZAP de criar issues no seu repositório
          allow_issue_writing: false
